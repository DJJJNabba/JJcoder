name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  create_release:
    runs-on: ubuntu-latest

    steps:
      - name: Ensure GitHub release exists
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release view "${GITHUB_REF_NAME}" --repo "${GITHUB_REPOSITORY}" > /dev/null 2>&1 || \
          gh release create "${GITHUB_REF_NAME}" \
            --repo "${GITHUB_REPOSITORY}" \
            --verify-tag \
            --generate-notes

  publish:
    needs: create_release
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            build_flags: --win nsis portable
          - os: macos-latest
            build_flags: --mac dmg zip
          - os: ubuntu-latest
            build_flags: --linux AppImage

    runs-on: ${{ matrix.os }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build app
        run: npm run build

      - name: Build release artifacts
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: "false"
        run: npx electron-builder ${{ matrix.build_flags }} --publish never

      - name: Upload release assets
        shell: pwsh
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          $files = Get-ChildItem release -File | Where-Object { $_.Name -ne "builder-debug.yml" } | ForEach-Object { $_.FullName }
          if (-not $files) {
            throw "No top-level release files were produced."
          }
          gh release upload $env:GITHUB_REF_NAME $files --repo $env:GITHUB_REPOSITORY --clobber
